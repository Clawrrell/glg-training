<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLG Training Dashboard</title>
<style>
  :root {
    --navy: #141c2c;
    --navy-light: #1e2d47;
    --navy-lighter: #253555;
    --gold: #D4A843;
    --gold-light: #f0c866;
    --gold-dim: #a07c2a;
    --white: #ffffff;
    --off-white: #f8f9fc;
    --card-bg: #ffffff;
    --text: #1a2340;
    --text-muted: #6b7a99;
    --border: #e4e8f0;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f97316;
    --purple: #8b5cf6;
    --blue: #3b82f6;
    --gold-rank1: #FFD700;
    --gold-rank2: #C0C0C0;
    --gold-rank3: #CD7F32;
    --shadow: 0 2px 12px rgba(20,28,44,0.10);
    --shadow-lg: 0 8px 32px rgba(20,28,44,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--off-white);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.3);
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    gap: 16px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 38px;
    height: 38px;
    background: var(--gold);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 16px;
    color: var(--navy);
    letter-spacing: -1px;
    flex-shrink: 0;
  }
  .logo-text {
    color: var(--white);
    font-weight: 700;
    font-size: 17px;
    line-height: 1.2;
  }
  .logo-sub {
    color: var(--gold);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .last-updated {
    color: #7a8bac;
    font-size: 12px;
  }
  .refresh-btn {
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .refresh-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
  .refresh-btn.spinning .refresh-icon { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── NAV TABS ── */
  nav {
    background: var(--navy-light);
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .nav-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    padding: 0 24px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-inner::-webkit-scrollbar { display: none; }
  .nav-tab {
    padding: 14px 20px;
    color: #8a9bbf;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .nav-tab:hover { color: var(--white); }
  .nav-tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* ── MAIN CONTENT ── */
  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* ── LOADING SKELETON ── */
  .skeleton-container { display: flex; flex-direction: column; gap: 16px; }
  .skeleton {
    background: linear-gradient(90deg, #e4e8f0 25%, #f0f3f9 50%, #e4e8f0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 12px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── CARDS ── */
  .card {
    background: var(--card-bg);
    border-radius: 14px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .card-header {
    padding: 18px 22px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-body { padding: 16px 22px; }

  /* ── STATS ROW ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--gold);
  }
  .stat-value {
    font-size: 32px;
    font-weight: 800;
    color: var(--navy);
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .stat-icon {
    position: absolute;
    top: 16px; right: 16px;
    font-size: 28px;
    opacity: 0.15;
  }

  /* ── LEADERBOARD ── */
  .leaderboard-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .lb-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 12px;
    background: var(--off-white);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .lb-row:hover { transform: translateX(4px); box-shadow: var(--shadow); border-color: var(--gold); }
  .lb-row.rank-1 { background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); border-color: #fbbf24; }
  .lb-row.rank-2 { background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); border-color: #94a3b8; }
  .lb-row.rank-3 { background: linear-gradient(135deg, #fff7f0 0%, #fde8d0 100%); border-color: #d97706; }

  .lb-rank {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 16px;
    flex-shrink: 0;
  }
  .rank-medal { font-size: 22px; }

  .lb-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 17px;
    color: white;
    flex-shrink: 0;
  }
  .lb-info { flex: 1; min-width: 0; }
  .lb-name {
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lb-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .lb-level {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 700;
    white-space: nowrap;
  }
  .lb-score {
    text-align: right;
    flex-shrink: 0;
  }
  .lb-points {
    font-size: 20px;
    font-weight: 800;
    color: var(--navy);
    line-height: 1;
  }
  .lb-pts-label { font-size: 10px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px; }

  /* ── PROGRESS BAR ── */
  .progress-bar-wrap {
    background: #e9ecf5;
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    transition: width 1s cubic-bezier(.4,0,.2,1);
  }
  .progress-bar-fill.green { background: linear-gradient(90deg, #16a34a, var(--green)); }
  .progress-bar-fill.red { background: linear-gradient(90deg, #dc2626, var(--red)); }

  /* ── EMPLOYEE PROFILE MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,15,28,0.72);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card-bg);
    border-radius: 20px;
    max-width: 700px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.3s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } }
  .modal-header {
    background: var(--navy);
    padding: 24px 28px;
    border-radius: 20px 20px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 26px;
    color: white;
    border: 3px solid var(--gold);
    flex-shrink: 0;
  }
  .modal-name { color: var(--white); font-size: 20px; font-weight: 800; }
  .modal-level { color: var(--gold); font-size: 14px; font-weight: 600; margin-top: 3px; }
  .modal-close {
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.2); }
  .modal-body { padding: 24px 28px; }
  .modal-section { margin-bottom: 24px; }
  .modal-section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  /* Module grid */
  .module-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
  }
  .module-cell {
    border-radius: 10px;
    padding: 12px 10px;
    text-align: center;
    border: 1.5px solid var(--border);
    transition: all 0.2s;
    cursor: default;
  }
  .module-cell.done { background: #f0fdf4; border-color: #86efac; }
  .module-cell.failed { background: #fff1f2; border-color: #fca5a5; }
  .module-cell.pending { background: #f8f9fc; border-color: var(--border); opacity: 0.65; }
  .module-cell-icon { font-size: 22px; margin-bottom: 5px; }
  .module-cell-id { font-size: 11px; font-weight: 800; color: var(--text-muted); letter-spacing: 0.5px; }
  .module-cell-score { font-size: 13px; font-weight: 700; margin-top: 2px; }

  /* Bar chart */
  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 100px;
    padding: 8px 0;
  }
  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
    justify-content: flex-end;
  }
  .bar-fill-wrap {
    width: 100%;
    background: #e9ecf5;
    border-radius: 6px 6px 0 0;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    flex: 1;
  }
  .bar-fill {
    width: 100%;
    border-radius: 6px 6px 0 0;
    transition: height 1s cubic-bezier(.4,0,.2,1);
    min-height: 4px;
  }
  .bar-label { font-size: 9px; font-weight: 700; color: var(--text-muted); text-align: center; line-height: 1.2; }
  .bar-val { font-size: 11px; font-weight: 700; }

  /* Badges */
  .badges-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    border: 1.5px solid;
  }

  /* ── MODULE INDEX ── */
  .module-list { display: flex; flex-direction: column; gap: 12px; }
  .module-card {
    background: var(--card-bg);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.2s;
  }
  .module-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: var(--gold); }
  .module-card-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--off-white);
    border-bottom: 1px solid var(--border);
  }
  .module-id-badge {
    background: var(--navy);
    color: var(--gold);
    font-weight: 800;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 8px;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .module-card-name { font-weight: 700; font-size: 16px; }
  .module-card-desc { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .module-card-stats { display: flex; gap: 20px; padding: 14px 20px; }
  .module-stat { text-align: center; }
  .module-stat-val { font-size: 22px; font-weight: 800; color: var(--navy); }
  .module-stat-lbl { font-size: 11px; color: var(--text-muted); font-weight: 600; }
  .module-completions {
    padding: 0 20px 16px;
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  .module-completions.open { display: flex; }
  .completion-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--off-white);
    border-radius: 8px;
    font-size: 13px;
  }
  .completion-name { font-weight: 600; }
  .score-pill {
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 12px;
  }
  .score-pill.pass { background: #dcfce7; color: #166534; }
  .score-pill.fail { background: #fee2e2; color: #991b1b; }

  /* ── HEAT MAP ── */
  .heat-map {
    overflow-x: auto;
  }
  .heat-table {
    border-collapse: collapse;
    font-size: 12px;
    min-width: 100%;
  }
  .heat-table th {
    background: var(--navy);
    color: var(--gold);
    padding: 8px 10px;
    text-align: left;
    font-weight: 700;
    white-space: nowrap;
  }
  .heat-table th.mod-col {
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    writing-mode: vertical-lr;
    transform: rotate(180deg);
    height: 90px;
    padding: 10px 8px;
    font-size: 11px;
  }
  .heat-table td {
    padding: 8px 10px;
    border: 1px solid var(--border);
    text-align: center;
    white-space: nowrap;
  }
  .heat-table tr:hover td { background: #f0f4ff; }
  .heat-cell {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    margin: 0 auto;
  }
  .heat-cell.pass { background: #dcfce7; }
  .heat-cell.fail { background: #fee2e2; }
  .heat-cell.none { background: #f1f5f9; color: #cbd5e1; }

  /* ── NEEDS ATTENTION ── */
  .attention-list { display: flex; flex-direction: column; gap: 8px; }
  .attention-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: #fff8f0;
    border: 1px solid #fed7aa;
    border-radius: 10px;
  }
  .attention-icon { font-size: 20px; }
  .attention-info { flex: 1; }
  .attention-name { font-weight: 700; font-size: 14px; }
  .attention-reason { font-size: 12px; color: var(--orange); margin-top: 2px; }

  /* ── MVP BANNER ── */
  .mvp-banner {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-lighter) 100%);
    border-radius: 16px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border: 2px solid var(--gold);
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .mvp-banner::before {
    content: '⭐';
    position: absolute;
    right: -10px;
    top: -10px;
    font-size: 80px;
    opacity: 0.06;
    transform: rotate(20deg);
  }
  .mvp-crown { font-size: 40px; flex-shrink: 0; }
  .mvp-label { color: var(--gold); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
  .mvp-name { color: var(--white); font-size: 22px; font-weight: 800; margin-top: 2px; }
  .mvp-score { color: #8a9bbf; font-size: 13px; margin-top: 3px; }
  .mvp-badge {
    margin-left: auto;
    background: var(--gold);
    color: var(--navy);
    font-weight: 800;
    font-size: 14px;
    padding: 8px 16px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* ── CONFETTI ── */
  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: confettiFall linear forwards;
    border-radius: 2px;
  }
  @keyframes confettiFall {
    to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* ── LEVEL COLORS ── */
  .level-trainee { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }
  .level-apprentice { background: #eff6ff; color: #1d4ed8; border-color: #93c5fd; }
  .level-associate { background: #f0fdf4; color: #166534; border-color: #86efac; }
  .level-specialist { background: #fdf4ff; color: #7e22ce; border-color: #d8b4fe; }
  .level-expert { background: #fffbeb; color: #92400e; border-color: #fcd34d; }

  /* ── AVATAR COLORS ── */
  .av-0 { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
  .av-1 { background: linear-gradient(135deg, #0ea5e9, #06b6d4); }
  .av-2 { background: linear-gradient(135deg, #10b981, #059669); }
  .av-3 { background: linear-gradient(135deg, #f59e0b, #d97706); }
  .av-4 { background: linear-gradient(135deg, #ef4444, #dc2626); }
  .av-5 { background: linear-gradient(135deg, #ec4899, #db2777); }
  .av-6 { background: linear-gradient(135deg, #14b8a6, #0d9488); }
  .av-7 { background: linear-gradient(135deg, #f97316, #ea580c); }
  .av-8 { background: linear-gradient(135deg, #84cc16, #65a30d); }
  .av-9 { background: linear-gradient(135deg, #a855f7, #9333ea); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state-text { font-size: 16px; font-weight: 600; }
  .empty-state-sub { font-size: 13px; margin-top: 6px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    main { padding: 16px 12px; }
    .header-inner { padding: 0 12px; }
    .nav-inner { padding: 0 12px; }
    .modal-body { padding: 16px; }
    .modal-header { padding: 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .mvp-badge { display: none; }
    .heat-table th, .heat-table td { padding: 6px 6px; }
  }

  /* ── POINTS ANIMATION ── */
  @keyframes pointsFloat {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-40px); }
  }
  .points-float {
    position: fixed;
    color: var(--gold);
    font-weight: 800;
    font-size: 18px;
    pointer-events: none;
    animation: pointsFloat 1.5s ease-out forwards;
    z-index: 9999;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>

<!-- CONFETTI CONTAINER -->
<div class="confetti-container" id="confettiContainer"></div>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">GLG</div>
      <div>
        <div class="logo-text">Gunn Law Group</div>
        <div class="logo-sub">Training Academy</div>
      </div>
    </div>
    <div class="header-right">

const MODULES = [
  { id: 'A1',    name: 'GLG Operations Overview',     desc: 'Firm history, structure, values, and how we operate day-to-day.' },
  { id: 'A3',    name: 'Personal Injury Basics',       desc: 'Core concepts: negligence, liability, damages, and claim fundamentals.' },
  { id: 'Day 2', name: 'Case Types & Practice Areas',  desc: 'Auto accidents, slip & fall, premises liability — know your cases.' },

  { id: 'Day 4', name: 'LORs & Templates',             desc: 'Letters of Representation, demand templates, and formal correspondence.' },
  { id: 'Day 5', name: 'Week 1 Mastery Challenge',     desc: 'Comprehensive exam covering all Week 1 material. Show what you know.' },
  { id: 'Day 6', name: 'Medical Records Mastery',      desc: 'Ordering, organizing, and analyzing medical records for case building.' },
  { id: 'Day 7', name: 'Coverage Verification',        desc: 'Confirming insurance coverage, policy limits, and claimant eligibility.' }
];

const LEVELS = [
  { name: 'Trainee',    min: 0, max: 1, icon: '🌱', cls: 'level-trainee' },
  { name: 'Apprentice', min: 2, max: 3, icon: '📖', cls: 'level-apprentice' },
  { name: 'Associate',  min: 4, max: 5, icon: '⚖️',  cls: 'level-associate' },

let appData = null;

// ═══════════════════════════════════════════
//  DATA FETCHING & PARSING
// ═══════════════════════════════════════════
async function loadData() {
  const btn = document.querySelector('.refresh-btn');
  btn.classList.add('spinning');

  try {
    const res = await fetch(SHEET_URL + '&t=' + Date.now());
    const text = await res.text();
    // Strip Google's callback wrapper: google.visualization.Query.setResponse({...})
    const jsonStr = text.replace(/^[^\(]+\(/, '').replace(/\);?\s*$/, '');
    const json = JSON.parse(jsonStr);

    appData = parseSheet(json);
    renderAll();

    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      'Updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    console.error('Data load error:', e);
    // Use demo data if fetch fails
    appData = getDemoData();
    renderAll();
    document.getElementById('lastUpdated').textContent = '⚠️ Demo data (sheet not public)';
  }

  btn.classList.remove('spinning');
}

function parseSheet(json) {
  const rows = json.table.rows;
  const entries = [];

  rows.forEach(row => {
    if (!row.c || !row.c[1] || !row.c[1].v) return;
    const ts = row.c[0] ? (row.c[0].v || '') : '';
    const name = (row.c[1].v || '').toString().trim();
    const moduleId = row.c[2] ? (row.c[2].v || '').toString().trim() : '';
    const moduleName = row.c[3] ? (row.c[3].v || '').toString().trim() : '';
    const score = row.c[4] ? parseFloat(row.c[4].v) || 0 : 0;
    const maxScore = row.c[5] ? parseFloat(row.c[5].v) || 100 : 100;
    const pct = row.c[6] ? parseFloat(row.c[6].v) || (score / maxScore * 100) : (score / maxScore * 100);
    const passFail = row.c[7] ? (row.c[7].v || '').toString().toLowerCase() : (pct >= 70 ? 'pass' : 'fail');

    if (!name || !moduleId) return;

    // Parse timestamp
    let date = null;
    if (ts) {
      // Google Sheets timestamps come as "Date(year,month,day,h,m,s)" 
      const m = ts.toString().match(/Date\((\d+),(\d+),(\d+)/);
      if (m) {
        date = new Date(parseInt(m[1]), parseInt(m[2]), parseInt(m[3]));
      } else {
        date = new Date(ts);
      }
    }

    entries.push({ name, moduleId, moduleName, score, maxScore, pct: Math.round(pct), passFail: passFail.includes('pass') ? 'pass' : 'fail', date });
  });

  return buildStats(entries);
}

function buildStats(entries) {
  const employees = {};

  entries.forEach(e => {
    if (!employees[e.name]) {
      employees[e.name] = { name: e.name, modules: {}, entries: [] };
    }
    const emp = employees[e.name];
    emp.entries.push(e);
    // Keep best attempt per module
    if (!emp.modules[e.moduleId] || e.pct > emp.modules[e.moduleId].pct) {
      emp.modules[e.moduleId] = e;
    }
  });

  // Build employee stats
  const empList = Object.values(employees).map((emp, i) => {
    const mods = Object.values(emp.modules);
    const passedMods = mods.filter(m => m.passFail === 'pass');
    const totalPoints = mods.reduce((sum, m) => sum + m.pct, 0);
    const avgScore = mods.length ? Math.round(totalPoints / mods.length) : 0;
    const level = getLevel(passedMods.length);
    const streak = calcStreak(emp.entries);
    const colorIdx = i % 10;

    return {
      name: emp.name,
      modules: emp.modules,
      entries: emp.entries,
      passedCount: passedMods.length,
      totalModules: mods.length,
      totalPoints,
      avgScore,
      level,
      streak,
      colorIdx
    };
  });

  // Sort by total points desc
  empList.sort((a, b) => b.totalPoints - a.totalPoints);
  empList.forEach((e, i) => e.rank = i + 1);

  // Weekly MVP
  const oneWeekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
  let mvp = null;
  let mvpScore = -1;
  empList.forEach(emp => {
    const weekEntries = emp.entries.filter(e => e.date && e.date >= oneWeekAgo);
    if (weekEntries.length > 0) {
      const avg = weekEntries.reduce((s, e) => s + e.pct, 0) / weekEntries.length;
      if (avg > mvpScore) { mvpScore = avg; mvp = { ...emp, weekAvg: Math.round(avg) }; }
    }
  });
  if (!mvp && empList.length > 0) {
    mvp = { ...empList[0], weekAvg: empList[0].avgScore };
  }

  // Module stats
  const moduleStats = {};
  MODULES.forEach(m => {
    moduleStats[m.id] = { id: m.id, name: m.name, desc: m.desc, completions: [], avgScore: 0 };
  });
  entries.forEach(e => {
    const ms = moduleStats[e.moduleId];
    if (ms) ms.completions.push(e);
  });
  Object.values(moduleStats).forEach(ms => {
    if (ms.completions.length) {
      ms.avgScore = Math.round(ms.completions.reduce((s, e) => s + e.pct, 0) / ms.completions.length);
    }
  });

  // Firm-wide stats
  const allPcts = entries.map(e => e.pct);
  const firmAvg = allPcts.length ? Math.round(allPcts.reduce((a, b) => a + b, 0) / allPcts.length) : 0;
  const totalCompletions = entries.filter(e => e.passFail === 'pass').length;

  return { employees: empList, moduleStats, firmAvg, totalCompletions, mvp };
}

function getLevel(count) {
  return LEVELS.find(l => count >= l.min && count <= l.max) || LEVELS[0];
}

function calcStreak(entries) {
  if (!entries.length) return 0;
  const sorted = [...entries].filter(e => e.date).sort((a, b) => b.date - a.date);
  if (!sorted.length) return entries.length;
  let streak = 0;
  const seen = new Set();
  for (const e of sorted) {
    if (!seen.has(e.moduleId)) {
      seen.add(e.moduleId);
      streak++;
    }
  }
  return streak;
}

// ── LEADERBOARD ──
function renderLeaderboard() {
  const { employees } = appData;
  const el = document.getElementById('leaderboard-content');

  if (!employees.length) {
    el.innerHTML = emptyState('No scores yet', 'Complete a training module to appear on the leaderboard!');
    return;
  }

  const rows = employees.map((emp, i) => {
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    const rankDisplay = i === 0 ? '<span class="rank-medal">🥇</span>'
                      : i === 1 ? '<span class="rank-medal">🥈</span>'
                      : i === 2 ? '<span class="rank-medal">🥉</span>'
                      : `<span style="color:var(--text-muted);font-size:14px">#${emp.rank}</span>`;
    const streak = emp.streak > 1 ? ` 🔥${emp.streak}` : '';

    return `
      <div class="lb-row ${rankClass}" onclick="openEmployee('${escHtml(emp.name)}')">
        <div class="lb-rank">${rankDisplay}</div>
        <div class="lb-avatar av-${emp.colorIdx}">${emp.name.charAt(0).toUpperCase()}</div>
        <div class="lb-info">
          <div class="lb-name">${escHtml(emp.name)}${streak}</div>
          <div class="lb-meta">${emp.passedCount} modules passed · avg ${emp.avgScore}%</div>
        </div>
        <span class="lb-level ${emp.level.cls}">${emp.level.icon} ${emp.level.name}</span>
        <div class="lb-score">
          <div class="lb-points">${emp.totalPoints}</div>
          <div class="lb-pts-label">POINTS</div>
        </div>
      </div>`;
  }).join('');

  el.innerHTML = `<div class="leaderboard-grid">${rows}</div>`;

  // Trigger points float animation
  setTimeout(() => floatPoints(), 400);
}

function floatPoints() {
  const rows = document.querySelectorAll('.lb-row');
  rows.forEach((row, i) => {
    setTimeout(() => {
      const rect = row.getBoundingClientRect();
      const el = document.createElement('div');
      el.className = 'points-float';
      el.textContent = '+' + appData.employees[i]?.totalPoints;
      el.style.left = (rect.right - 80) + 'px';
      el.style.top = (rect.top + 10) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1600);
    }, i * 80);
  });
}

// ── DASHBOARD ──

  const { employees, firmAvg, totalCompletions, mvp, moduleStats } = appData;
  const totalEmployees = employees.length;
  const totalPossible = totalEmployees * MODULES.length;

  // Needs attention: below 70% avg OR hasn't started
  const attention = employees.filter(e => e.avgScore < 70 || e.passedCount === 0);

  const mvpHtml = mvp ? `
    <div class="mvp-banner">
      <div class="mvp-crown">👑</div>
      <div>
        <div class="mvp-label">Weekly MVP</div>
        <div class="mvp-name">${escHtml(mvp.name)}</div>
        <div class="mvp-score">${mvp.weekAvg}% average this week</div>
      </div>
      <div class="mvp-badge">🏆 MVP</div>
    </div>` : '';

  const statsHtml = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-value">${totalCompletions}</div>
        <div class="stat-label">Total Completions</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-value">${firmAvg}%</div>
        <div class="stat-label">Firm Average</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-value">${totalEmployees}</div>
        <div class="stat-label">Active Learners</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🎯</div>
        <div class="stat-value">${totalPossible ? Math.round(totalCompletions / totalPossible * 100) : 0}%</div>
        <div class="stat-label">Overall Progress</div>
      </div>
    </div>`;

  // Heatmap
  const heatHtml = buildHeatmap(employees);

  const attHtml = attention.length ? attention.map(emp => {
    const reason = emp.passedCount === 0 ? 'No modules completed yet'
                 : `Average score ${emp.avgScore}% — below 70% threshold`;
    return `
      <div class="attention-row">
        <div class="attention-icon">⚠️</div>
        <div class="attention-info">
          <div class="attention-name">${escHtml(emp.name)}</div>
          <div class="attention-reason">${reason}</div>
        </div>
        <button onclick="openEmployee('${escHtml(emp.name)}')" style="background:var(--orange);color:white;border:none;border-radius:8px;padding:6px 14px;font-weight:700;font-size:12px;cursor:pointer;">View</button>
      </div>`;
  }).join('') : `<div style="padding:20px;text-align:center;color:var(--green);font-weight:700">✅ Everyone's on track!</div>`;

  document.getElementById('dashboard-content').innerHTML = `
    ${mvpHtml}
    ${statsHtml}
    <div style="display:grid;grid-template-columns:1fr;gap:20px">
      <div class="card">
        <div class="card-header">
          <div class="card-title">🗺️ Module Completion Heatmap</div>
        </div>
        <div class="card-body heat-map">${heatHtml}</div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">⚠️ Needs Attention</div>
        </div>
        <div class="card-body">
          <div class="attention-list">${attHtml}</div>
        </div>
      </div>
    </div>`;
}

function buildHeatmap(employees) {
  if (!employees.length) return '<p style="color:var(--text-muted)">No data yet.</p>';

  const headerCols = MODULES.map(m => `<th class="mod-col" title="${m.name}">${m.id}: ${m.name}</th>`).join('');

  const rows = employees.map(emp => {
    const cells = MODULES.map(m => {
      const mod = emp.modules[m.id];
      if (!mod) return `<td><div class="heat-cell none">—</div></td>`;
      const icon = mod.passFail === 'pass' ? '✅' : '❌';
      const cls = mod.passFail === 'pass' ? 'pass' : 'fail';
      return `<td title="${mod.pct}%"><div class="heat-cell ${cls}">${icon}</div></td>`;
    }).join('');
    return `<tr><td style="font-weight:700;text-align:left;white-space:nowrap;padding:8px 12px">${escHtml(emp.name)}</td>${cells}</tr>`;
  }).join('');

  return `
    <table class="heat-table">
      <thead><tr><th>Employee</th>${headerCols}</tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── MODULES ──

    return `
      <div class="module-card" onclick="toggleModuleExpand(this)">

          <div>

            <div class="module-card-desc">${m.desc}</div>

        <div class="module-card-stats">

            <div class="module-stat-val">${ms.completions.length}</div>

          </div>

            <div class="module-stat-val">${passCount}</div>
            <div class="module-stat-lbl">Passed</div>
          </div>
          <div class="module-stat">
            <div class="module-stat-val">${ms.avgScore ? ms.avgScore + '%' : '—'}</div>

            <div class="module-stat-val" style="font-size:22px">${ms.completions.length > 0 ? (ms.avgScore >= 80 ? '🟢' : ms.avgScore >= 70 ? '🟡' : '🔴') : '⚪'}</div>

          ${completionsList}
        </div>

  }).join('');

  document.getElementById('modules-content').innerHTML = `<div class="module-list">${cards}</div>`;
}

function toggleModuleExpand(card) {

// ── EMPLOYEE PROFILE ──
function openEmployee(name) {
  const emp = appData.employees.find(e => e.name === name);
  if (!emp) return;

  const pct = Math.round((emp.passedCount / MODULES.length) * 100);

  const moduleGrid = MODULES.map(m => {
    const mod = emp.modules[m.id];
    if (!mod) return `
      <div class="module-cell pending">
        <div class="module-cell-icon">🔒</div>
        <div class="module-cell-id">${m.id}</div>
        <div class="module-cell-score" style="color:var(--text-muted)">—</div>
      </div>`;
    const icon = mod.passFail === 'pass' ? '✅' : '❌';
    const cls = mod.passFail === 'pass' ? 'done' : 'failed';
    return `
      <div class="module-cell ${cls}">
        <div class="module-cell-icon">${icon}</div>
        <div class="module-cell-id">${m.id}</div>
        <div class="module-cell-score" style="color:${mod.passFail === 'pass' ? 'var(--green)' : 'var(--red)'}">${mod.pct}%</div>
      </div>`;
  }).join('');

  // Bar chart data
  const barChart = buildBarChart(emp);

  // Badges
  const badges = getBadges(emp);
  const badgesHtml = badges.map(b => `<span class="badge ${b.cls}">${b.icon} ${b.name}</span>`).join('');

  // Streak
  const streakHtml = emp.streak > 0
    ? `<span style="font-size:14px;font-weight:700">🔥 ${emp.streak}-module streak!</span>`
    : '<span style="color:var(--text-muted);font-size:13px">No streak yet</span>';

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:14px">
        <div class="modal-avatar av-${emp.colorIdx}">${emp.name.charAt(0).toUpperCase()}</div>
        <div>
          <div class="modal-name">${escHtml(emp.name)}</div>
          <div class="modal-level">${emp.level.icon} ${emp.level.name} · Rank #${emp.rank}</div>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="modal-section-title">Overall Progress</div>
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:13px;color:var(--text-muted)">${emp.passedCount} of ${MODULES.length} modules passed</span>
          <span style="font-size:13px;font-weight:700">${pct}%</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill green" style="width:0" data-target="${pct}"></div>
        </div>
        <div style="display:flex;gap:20px;margin-top:12px">
          <div><span style="font-size:22px;font-weight:800;color:var(--navy)">${emp.totalPoints}</span><br><span style="font-size:11px;color:var(--text-muted);font-weight:600">TOTAL POINTS</span></div>
          <div><span style="font-size:22px;font-weight:800;color:var(--navy)">${emp.avgScore}%</span><br><span style="font-size:11px;color:var(--text-muted);font-weight:600">AVG SCORE</span></div>
          <div>${streakHtml}</div>
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Module Grid</div>
        <div class="module-grid">${moduleGrid}</div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Score History</div>
        ${barChart}
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Badges Earned</div>
        <div class="badges-row">${badgesHtml || '<span style="color:var(--text-muted);font-size:13px">Complete more modules to earn badges!</span>'}</div>
      </div>
    </div>`;

  document.getElementById('employeeModal').classList.add('open');

  // Animate progress bar after open
  setTimeout(() => {
    const bar = document.querySelector('#modalContent .progress-bar-fill');
    if (bar) bar.style.width = bar.dataset.target + '%';
  }, 100);
}

function buildBarChart(emp) {
  const completedMods = MODULES.filter(m => emp.modules[m.id]);
  if (!completedMods.length) return '<div style="color:var(--text-muted);font-size:13px">No scores yet.</div>';

  const cols = completedMods.map(m => {
    const mod = emp.modules[m.id];
    const h = mod.pct;
    const color = mod.passFail === 'pass' ? '#22c55e' : '#ef4444';
    return `
      <div class="bar-col">
        <div class="bar-val" style="color:${color}">${h}%</div>
        <div class="bar-fill-wrap">
          <div class="bar-fill" style="height:0;background:${color}" data-target="${h}"></div>
        </div>
        <div class="bar-label">${m.id}</div>
      </div>`;
  }).join('');

  setTimeout(() => {
    document.querySelectorAll('#modalContent .bar-fill').forEach(b => {
      b.style.height = b.dataset.target + '%';
    });
  }, 150);

  return `<div class="bar-chart">${cols}</div>`;
}

function getBadges(emp) {
  const badges = [];
  if (emp.passedCount >= 1) badges.push({ icon: '🌱', name: 'First Step', cls: 'level-trainee' });
  if (emp.passedCount >= 3) badges.push({ icon: '📖', name: 'Quick Study', cls: 'level-apprentice' });
  if (emp.passedCount >= 5) badges.push({ icon: '⚖️', name: 'Law Mind', cls: 'level-associate' });
  if (emp.passedCount >= MODULES.length) badges.push({ icon: '🌟', name: 'GLG Expert', cls: 'level-expert' });
  if (emp.avgScore >= 90) badges.push({ icon: '🎯', name: 'Sharpshooter', cls: 'level-specialist' });
  if (emp.avgScore === 100) badges.push({ icon: '💎', name: 'Perfect Score', cls: 'level-expert' });
  if (emp.streak >= 3) badges.push({ icon: '🔥', name: `${emp.streak}-Streak`, cls: 'level-associate' });
  if (emp.rank === 1) badges.push({ icon: '👑', name: 'Top of Class', cls: 'level-expert' });
  return badges;
}

function closeModal() {
  document.getElementById('employeeModal').classList.remove('open');
}

// ── TAB NAVIGATION ──
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
}

// ── UTILITIES ──
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function emptyState(title, sub) {
  return `<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">${title}</div><div class="empty-state-sub">${sub}</div></div>`;
}

// ── CONFETTI ──
function fireConfetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#D4A843','#141c2c','#22c55e','#ef4444','#3b82f6','#8b5cf6','#f97316'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    piece.style.animationDelay = Math.random() * 0.5 + 's';
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    piece.style.width = piece.style.height = (6 + Math.random() * 8) + 'px';
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 4000);
  }
}

// Click outside modal to close
document.getElementById('employeeModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── INIT ──
loadData();
</script>
</body>
</html>
